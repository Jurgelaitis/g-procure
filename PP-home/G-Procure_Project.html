<!-- EPSO-G dizaino zetonai (spalvos + sriftas) - bendras failas, vienas tiesos saltinis -->
<link rel="stylesheet" href="../shared/epso-g.css" />

<style>
  :root {
    /* Spalvos ir --font-base ateina is ../shared/epso-g.css */
    --shadow-card: 0 1px 2px rgba(46, 54, 65, 0.04);
    --shadow-card-hover: 0 12px 32px rgba(46, 54, 65, 0.08);
    --transition-med: 240ms ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-base);
    font-size: 16px;
    line-height: 1.55;
    color: var(--color-graphite);
    background-color: var(--color-white);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    background-image:
      radial-gradient(1100px 600px at 90% -200px, rgba(22, 196, 146, 0.07), transparent 60%),
      radial-gradient(900px 500px at -10% 0%, rgba(0, 165, 196, 0.05), transparent 55%);
    background-attachment: fixed;
  }

  a { color: inherit; text-decoration: none; }

  /* Klaviaturos naudotojams - nuoroda i turini, matoma tik gavus fokusa. */
  .skip-link {
    position: absolute;
    left: var(--space-3);
    top: -60px;
    z-index: 100;
    background: var(--color-emerald);
    color: var(--color-white);
    font-weight: 700;
    font-size: 14px;
    padding: 10px 18px;
    border-radius: 999px;
    transition: top var(--transition-fast);
  }
  .skip-link:focus { top: 10px; }

  /* Matomas fokuso ziedas visiems interaktyviems elementams (klaviatura). */
  a:focus-visible,
  button:focus-visible,
  .chip:focus-visible,
  .btn-open:focus-visible,
  .btn-secondary:focus-visible {
    outline: 2px solid var(--color-emerald);
    outline-offset: 2px;
    border-radius: var(--radius-sm);
  }

  .container {
    width: 100%;
    max-width: var(--container-max);
    margin: 0 auto;
    padding: 0 var(--space-3);
  }

  /* ============ HEADER (kaip About) ============ */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: saturate(140%) blur(10px);
    -webkit-backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--color-graphite-15);
  }
  .site-header__inner {
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
  }
  .brand { display: flex; align-items: center; gap: var(--space-2); }
  .brand:hover .brand__product-name { color: var(--color-emerald-120); }
  .brand__logo { height: 28px; width: auto; flex-shrink: 0; }
  .brand__divider { width: 1px; height: 26px; background: var(--color-graphite-15); }
  .brand__product { display: flex; flex-direction: column; line-height: 1.1; }
  .brand__product-name {
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.01em;
    color: var(--color-graphite);
    transition: color var(--transition-fast);
  }
  .brand__product-name em { color: var(--color-emerald); font-style: normal; }
  .brand__product-tag {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--color-graphite-50);
    margin-top: 2px;
  }
  .site-header__actions { display: flex; align-items: center; gap: var(--space-2); }
  .nav-link {
    font-size: 14px;
    font-weight: 600;
    color: var(--color-graphite-50);
    transition: color var(--transition-fast);
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .nav-link:hover { color: var(--color-emerald); }
  .nav-link__arrow { font-size: 16px; line-height: 1; transition: transform var(--transition-fast); }
  .nav-link:hover .nav-link__arrow { transform: translateX(-3px); }
  .lang-switch {
    display: inline-flex;
    border: 1px solid var(--color-graphite-15);
    border-radius: 999px;
    padding: 3px;
    background: var(--color-white);
  }
  .lang-switch__btn {
    border: 0;
    background: transparent;
    font-family: var(--font-base);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--color-graphite-50);
    padding: 5px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: background var(--transition-fast), color var(--transition-fast);
  }
  .lang-switch__btn:hover { color: var(--color-graphite); }
  .lang-switch__btn[aria-pressed="true"] { background: var(--color-emerald); color: var(--color-white); }
  .lang-switch__btn:focus-visible { outline: 2px solid var(--color-emerald); outline-offset: 2px; }

  /* ============ PAGE INTRO ============ */
  .page-intro { padding: var(--space-6) 0 var(--space-4); }
  .page-intro__eyebrow {
    display: inline-flex;
    align-items: center;
    padding: 6px 12px;
    background: var(--color-green-5);
    color: var(--color-emerald-120);
    border: 1px solid var(--color-green-15);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: var(--space-3);
  }
  .page-intro__title {
    font-size: clamp(32px, 4vw, 44px);
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--color-graphite);
    line-height: 1.1;
    margin-bottom: var(--space-2);
  }
  .page-intro__lead {
    font-size: 17px;
    color: var(--color-graphite-50);
    max-width: 760px;
    line-height: 1.6;
  }

  /* ============ SEKCIJU ANTRASTES ============ */
  .section { padding: var(--space-3) 0 var(--space-5); }
  .section__head {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: var(--space-3);
    margin-bottom: var(--space-3);
    flex-wrap: wrap;
  }
  .section__title {
    font-size: 22px;
    font-weight: 800;
    color: var(--color-graphite);
    letter-spacing: -0.015em;
  }
  .section__hint { font-size: 13px; color: var(--color-graphite-50); }

  /* ============ P2: TURINYS (hero verte, kaip veikia, pasitikejimas, busena) ============ */
  .page-intro__value {
    font-size: clamp(19px, 2.4vw, 24px);
    font-weight: 800;
    color: var(--color-emerald-120);
    letter-spacing: -0.01em;
    line-height: 1.25;
    max-width: 820px;
    margin-bottom: var(--space-2);
  }
  /* Kaip veikia - 4 zingsniai */
  .steps {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--space-3);
  }
  .step {
    background: var(--color-white);
    border: 1px solid var(--color-graphite-15);
    border-radius: var(--radius-lg);
    padding: var(--space-3);
    box-shadow: var(--shadow-card);
  }
  .step__num {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--color-emerald);
    color: var(--color-white);
    font-weight: 800;
    font-size: 15px;
    margin-bottom: var(--space-2);
  }
  .step__title { font-size: 15px; font-weight: 800; color: var(--color-graphite); margin-bottom: 6px; }
  .step__text { font-size: 13.5px; line-height: 1.6; color: var(--color-graphite-50); }
  /* Pasitikejimo blokas */
  .trust-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: var(--space-3);
  }
  .trust-item {
    padding: var(--space-3);
    background: var(--color-green-5);
    border: 1px solid var(--color-green-15);
    border-radius: var(--radius-lg);
  }
  .trust-item__title { font-size: 14.5px; font-weight: 800; color: var(--color-graphite); margin-bottom: 4px; }
  .trust-item__text { font-size: 13px; line-height: 1.6; color: var(--color-graphite-50); }
  /* Dabar / Tiksline kryptis */
  .statecards {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--space-3);
  }
  .statecard {
    padding: var(--space-3) var(--space-4);
    border-radius: var(--radius-lg);
    border: 1px solid var(--color-graphite-15);
    background: var(--color-white);
  }
  .statecard--now { border-left: 4px solid var(--color-emerald); }
  .statecard--next { border-left: 4px solid var(--color-blue); }
  .statecard__label {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--color-graphite-50);
    margin-bottom: var(--space-1);
  }
  .statecard__text { font-size: 14px; line-height: 1.6; color: var(--color-graphite); }

  /* ============ CIKLO ZEMELAPIS ============ */
  #map { scroll-margin-top: 88px; }
  .map {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: var(--space-4);
  }
  .stage {
    position: relative;
    background: var(--color-white);
    border: 1px solid var(--color-graphite-15);
    border-radius: var(--radius-lg);
    padding: var(--space-3);
    box-shadow: var(--shadow-card);
  }
  /* Rodykle tarp etapu (desktop: i desine) */
  .stage:not(:last-child)::after {
    content: "\2192";
    position: absolute;
    right: -26px;
    top: 22px;
    font-size: 22px;
    font-weight: 800;
    color: var(--color-emerald-50);
    pointer-events: none;
  }
  .stage__head {
    display: flex;
    align-items: center;
    gap: var(--space-1);
    margin-bottom: var(--space-2);
    padding-bottom: var(--space-1);
    border-bottom: 1px solid var(--color-graphite-15);
  }
  .stage__num {
    width: 26px;
    height: 26px;
    flex-shrink: 0;
    display: grid;
    place-items: center;
    border-radius: 50%;
    background: var(--color-emerald);
    color: var(--color-white);
    font-size: 13px;
    font-weight: 800;
  }
  .stage__title {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--color-graphite);
  }
  .stage__chips { display: flex; flex-direction: column; gap: var(--space-1); }

  .chip {
    display: block;
    border: 1px solid var(--color-graphite-15);
    border-radius: var(--radius-sm);
    padding: 8px 12px;
    background: var(--color-white);
    transition: border-color var(--transition-fast),
                box-shadow var(--transition-med),
                transform var(--transition-med);
  }
  .chip:hover {
    border-color: var(--color-emerald-50);
    box-shadow: var(--shadow-card-hover);
    transform: translateY(-1px);
  }
  .chip:focus-visible { outline: 2px solid var(--color-emerald); outline-offset: 2px; }
  .chip__code {
    display: block;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .chip__name {
    display: block;
    font-size: 13px;
    color: var(--color-graphite-50);
    line-height: 1.35;
  }
  /* Kategoriju spalvos - tos pacios kaip portalo badge */
  .chip--planning  { border-left: 4px solid var(--color-blue);        background: var(--color-cyan-5); }
  .chip--planning .chip__code { color: var(--color-blue); }
  .chip--analysis  { border-left: 4px solid #8C6A1F;                  background: #FFF8E8; }
  .chip--analysis .chip__code { color: #8C6A1F; }
  .chip--execution { border-left: 4px solid var(--color-emerald-120); background: var(--color-green-5); }
  .chip--execution .chip__code { color: var(--color-emerald-120); }
  .chip--reporting { border-left: 4px solid #5B3DAA;                  background: #F2EBFF; }
  .chip--reporting .chip__code { color: #5B3DAA; }

  /* P1: EPD palydovas prie PP-carbon */
  .chip--satellite {
    margin-left: var(--space-2);
    border-style: dashed;
    border-left: 4px dashed #5B3DAA;
    background: var(--color-white);
    position: relative;
  }
  .chip--satellite::before {
    content: "";
    position: absolute;
    left: -13px;
    top: 50%;
    width: 12px;
    height: 1px;
    background: var(--color-graphite-30);
  }
  .chip__tag {
    display: inline-block;
    margin-top: 3px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--color-emerald-120);
    background: var(--color-green-5);
    border: 1px solid var(--color-green-15);
    border-radius: 999px;
    padding: 1px 8px;
  }

  /* ============ MODULIU APRASYMAI ============ */
  .mod-list { display: flex; flex-direction: column; gap: var(--space-3); }
  .mod-card {
    background: var(--color-white);
    border: 1px solid var(--color-graphite-15);
    border-radius: var(--radius-lg);
    padding: var(--space-3) var(--space-4);
    box-shadow: var(--shadow-card);
    scroll-margin-top: 88px;
  }
  .mod-card:target { border-color: var(--color-emerald); box-shadow: 0 0 0 3px rgba(0, 160, 114, 0.15); }
  .mod-card__head {
    display: flex;
    align-items: center;
    gap: var(--space-1);
    flex-wrap: wrap;
    margin-bottom: var(--space-1);
  }
  .mod-card__code {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    color: var(--color-emerald);
  }
  .mod-badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 3px 10px;
    border-radius: 999px;
    border: 1px solid var(--color-graphite-15);
    background: var(--color-graphite-5);
    color: var(--color-graphite-50);
    white-space: nowrap;
  }
  .mod-badge--planning  { background: var(--color-cyan-5); color: var(--color-blue); border-color: rgba(0, 102, 125, 0.18); }
  .mod-badge--analysis  { background: #FFF8E8; color: #8C6A1F; border-color: #F4E4BD; }
  .mod-badge--execution { background: var(--color-green-5); color: var(--color-emerald-120); border-color: var(--color-green-15); }
  .mod-badge--reporting { background: #F2EBFF; color: #5B3DAA; border-color: #DBCDF7; }
  /* P4: busenos zyma */
  .mod-status {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--color-graphite-50);
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .mod-status::before {
    content: "";
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--color-graphite-30);
  }
  /* Taskelio spalva pagal brandos lygi (greitas vizualus skaitymas). */
  .mod-status--is-live::before  { background: var(--color-emerald); }
  .mod-status--is-pilot::before { background: #C8901E; }
  .mod-status--is-dev::before   { background: var(--color-graphite-30); }
  /* AI zyma - maza, atskira nuo brandos ir nuo etapo zenklo. */
  .mod-ai {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.06em;
    padding: 2px 7px;
    border-radius: 999px;
    border: 1px solid var(--color-emerald-50);
    color: var(--color-emerald-120);
    background: transparent;
    white-space: nowrap;
  }
  .mod-card__title {
    font-size: 19px;
    font-weight: 800;
    color: var(--color-graphite);
    letter-spacing: -0.012em;
    margin-bottom: 6px;
  }
  .mod-card__desc {
    font-size: 14.5px;
    line-height: 1.6;
    color: var(--color-graphite-50);
    max-width: 860px;
    margin-bottom: var(--space-2);
  }
  .mod-card__foot {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    flex-wrap: wrap;
    padding-top: var(--space-2);
    border-top: 1px solid var(--color-graphite-15);
  }
  .btn-open {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--color-emerald);
    color: var(--color-white);
    font-size: 14px;
    font-weight: 700;
    padding: 9px 18px;
    border-radius: 999px;
    transition: background var(--transition-fast);
  }
  .btn-open:hover { background: var(--color-emerald-120); }
  .btn-open::after { content: "\2192"; font-size: 16px; line-height: 1; }
  .btn-secondary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--color-white);
    color: var(--color-emerald-120);
    border: 1px solid var(--color-green-15);
    font-size: 14px;
    font-weight: 700;
    padding: 8px 18px;
    border-radius: 999px;
    transition: border-color var(--transition-fast), color var(--transition-fast);
  }
  .btn-secondary:hover { border-color: var(--color-emerald); color: var(--color-emerald); }
  .back-to-map {
    margin-left: auto;
    font-size: 13px;
    font-weight: 600;
    color: var(--color-graphite-50);
    transition: color var(--transition-fast);
  }
  .back-to-map:hover { color: var(--color-emerald); }

  /* ============ P5: TEISINIO KONTEKSTO JUOSTA ============ */
  .legal-strip {
    background: var(--color-graphite-5);
    border: 1px solid var(--color-graphite-15);
    border-radius: var(--radius-lg);
    padding: var(--space-3) var(--space-4);
  }
  .legal-strip__title {
    font-size: 12px;
    font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--color-graphite-50);
    margin-bottom: var(--space-1);
  }
  .legal-strip__text {
    font-size: 13.5px;
    line-height: 1.65;
    color: var(--color-graphite-50);
    max-width: 980px;
  }
  .legal-strip__text strong { color: var(--color-graphite); }

  /* ============ FOOTER (kaip About) ============ */
  .footer {
    margin-top: var(--space-5);
    padding: var(--space-4) 0;
    border-top: 1px solid var(--color-graphite-15);
    background: var(--color-white);
  }
  .footer__inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: var(--space-3);
    flex-wrap: wrap;
  }
  .footer__brand {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    font-size: 13px;
    color: var(--color-graphite-50);
  }
  .footer__meta { font-size: 12px; color: var(--color-graphite-50); letter-spacing: 0.02em; }
  .footer__meta a {
    color: var(--color-graphite);
    font-weight: 600;
    border-bottom: 1px solid var(--color-graphite-15);
    transition: color var(--transition-fast), border-color var(--transition-fast);
  }
  .footer__meta a:hover { color: var(--color-emerald); border-color: var(--color-emerald); }

  /* ============ RESPONSIVE ============ */
  @media (max-width: 980px) {
    .map { grid-template-columns: 1fr 1fr; }
    .steps { grid-template-columns: 1fr 1fr; }
    /* Rodykles slepiam, kai tinklelis nebe viena eilute */
    .stage:not(:last-child)::after { display: none; }
  }
  @media (max-width: 640px) {
    /* Antraste: prekes zenklas viena eilute, veiksmai (grizti + kalba) po ja -
       taip kalbos perjungimas niekada nelieka uz ekrano (pries tai buvo x=393). */
    .site-header__inner {
      height: auto;
      flex-wrap: wrap;
      padding-top: 10px;
      padding-bottom: 10px;
      row-gap: 8px;
    }
    .brand { flex: 1 1 100%; min-width: 0; }

    .site-header__actions { flex: 1 1 100%; justify-content: space-between; }
    .page-intro { padding: var(--space-4) 0 var(--space-3); }

    .steps { grid-template-columns: 1fr; }

    /* Vertikali rodykle zemyn tarp etapu */
    .stage:not(:last-child)::after {
      display: block;
      content: "\2193";
      right: auto;
      left: 50%;
      top: auto;
      bottom: -26px;
      transform: translateX(-50%);
    }
    .mod-card { padding: var(--space-3); }
    .back-to-map { margin-left: 0; width: 100%; }
  }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    .chip, .chip:hover { transform: none; }
  }

<main id="main">
  <!-- ============ PAGE INTRO ============ -->
  <section class="page-intro">
    <div class="container">
      <span class="page-intro__eyebrow" data-lt="Pirkimo ciklo žemėlapis" data-en="The procurement cycle map"></span>
      <h1 class="page-intro__title" data-lt="Apie projektą" data-en="About the project"></h1>
      <p class="page-intro__value" data-lt="Parengti dokumentai, analizė ir grafikai visam pirkimo ciklui" data-en="Prepared documents, analysis and schedules for the entire procurement cycle"></p>
      <p class="page-intro__lead" data-lt="G-Procure sujungia visus EPSO-G grupės pirkimų ciklo įrankius - nuo planavimo iki ataskaitų - į vieną vietą. Kiekvienas modulis dengia vieną ciklo žingsnį ir grąžina konkretų rezultatą: dokumentą, analizę ar grafiką." data-en="G-Procure brings together all of the EPSO-G Group's procurement-cycle tools - from planning to reporting - in one place. Each module covers one step of the cycle and returns a concrete result: a document, an analysis or a schedule."></p>
    </div>
  </section>

  <!-- ============ P2: KAIP VEIKIA ============ -->
  <section class="section" id="how">
    <div class="container">
      <div class="section__head">
        <h2 class="section__title" data-lt="Kaip veikia" data-en="How it works"></h2>
        <span class="section__hint" data-lt="Keturi žingsniai nuo įrankio iki rezultato" data-en="Four steps from tool to result"></span>
      </div>
      <div class="steps">
        <div class="step">
          <span class="step__num">1</span>
          <div class="step__title" data-lt="Pasirinkite įrankį" data-en="Choose a tool"></div>
          <p class="step__text" data-lt="Portale pasirinkite modulį pagal pirkimo ciklo žingsnį. Įrankis atsidaro tiesiai naršyklėje, be diegimo." data-en="In the portal, pick a module by procurement-cycle step. The tool opens straight in your browser, with no installation."></p>
        </div>
        <div class="step">
          <span class="step__num">2</span>
          <div class="step__title" data-lt="Suveskite duomenis" data-en="Enter your data"></div>
          <p class="step__text" data-lt="Užpildykite laukus arba atsakykite į kontrolinius klausimus. Dalį jų galima perkelti iš turimų dokumentų, pavyzdžiui, DocLogix paraiškos." data-en="Fill in the fields or answer the checklist questions. Some can be pulled from existing documents, for example a DocLogix request."></p>
        </div>
        <div class="step">
          <span class="step__num">3</span>
          <div class="step__title" data-lt="Gaukite rezultatą" data-en="Get the result"></div>
          <p class="step__text" data-lt="Įrankis surenka dokumentą, grafiką ar analizę. Jūsų duomenys lieka naršyklėje; AI įrankiuose analizuojamas turinys siunčiamas išorinei analizei (Claude API) per proxy." data-en="The tool assembles a document, schedule or analysis. Your data stays in the browser; in AI tools the analysed content is sent for external analysis (Claude API) via a proxy."></p>
        </div>
        <div class="step">
          <span class="step__num">4</span>
          <div class="step__title" data-lt="Peržiūrėkite ir nuspręskite" data-en="Review and decide"></div>
          <p class="step__text" data-lt="Rezultatą peržiūrėkite ir eksportuokite dokumentu; dalis įrankių - dvikalbiu LT/EN. Galutinį sprendimą priima žmogus." data-en="Review the result and export it as a document; some tools are bilingual LT/EN. The final decision is made by a person."></p>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ P2: PASITIKEJIMAS ============ -->
  <section class="section" id="trust">
    <div class="container">
      <div class="section__head">
        <h2 class="section__title" data-lt="Kuo remiasi G-Procure" data-en="What G-Procure is built on"></h2>
      </div>
      <div class="trust-grid">
        <div class="trust-item">
          <div class="trust-item__title" data-lt="Visas pirkimo ciklas vienoje vietoje" data-en="The full procurement cycle in one place"></div>
          <p class="trust-item__text" id="trust-cikle" data-lt="Savarankiški įrankiai per keturis pirkimo ciklo etapus - nuo planavimo iki ataskaitų ir atitikties." data-en="Self-contained tools across the four procurement-cycle stages - from planning to reporting and compliance."></p>
        </div>
        <div class="trust-item">
          <div class="trust-item__title" data-lt="LITGRID šablonai ir teisinis pagrindas" data-en="LITGRID templates and legal basis"></div>
          <p class="trust-item__text" data-lt="Pirkimo sąlygos surenkamos iš LITGRID šablonų; kvalifikaciniai reikalavimai vertinami pagal PĮ, VPT metodiką ir teismų praktiką." data-en="Procurement conditions are assembled from LITGRID templates; qualification requirements follow PĮ, the VPT methodology and case law."></p>
        </div>
        <div class="trust-item">
          <div class="trust-item__title" data-lt="Centralizuotos vertės ribos ir terminai" data-en="Centralised thresholds and deadlines"></div>
          <p class="trust-item__text" data-lt="VPT vertės ribos ir terminų skaičiavimas darbo dienomis (su LR šventėmis) laikomi vienoje vietoje, todėl juos naudojantys įrankiai remiasi tuo pačiu šaltiniu." data-en="VPT thresholds and working-day deadline calculation (including Lithuanian public holidays) are kept in one place, so the tools that use them draw on the same source."></p>
        </div>
        <div class="trust-item">
          <div class="trust-item__title" data-lt="Duomenys lieka jūsų naršyklėje" data-en="Your data stays in your browser"></div>
          <p class="trust-item__text" data-lt="Įvesti duomenys saugomi tik naršyklėje (localStorage), be serverio duomenų bazės; dalis įrankių nesaugo nieko. AI įrankiai analizei siunčia turinį išorei (Claude API) per proxy." data-en="The data you enter is stored only in the browser (localStorage), with no server database; some tools store nothing. AI tools send content for external analysis (Claude API) via a proxy."></p>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ CIKLO ZEMELAPIS ============ -->
  <section class="section" id="map">
    <div class="container">
      <div class="section__head">
        <h2 class="section__title" data-lt="Pirkimo ciklas ir įrankiai" data-en="The procurement cycle and its tools"></h2>
        <span class="section__hint" data-lt="Spustelėkite modulį, kad pamatytumėte jo aprašymą" data-en="Click a module to see its description"></span>
      </div>
      <div class="map" id="map-grid"></div>
    </div>
  </section>

  <!-- ============ MODULIU APRASYMAI ============ -->
  <section class="section" id="modules">
    <div class="container">
      <div class="section__head">
        <h2 class="section__title" data-lt="Modulių aprašymai" data-en="Module descriptions"></h2>
        <span class="section__hint" data-lt="Mygtukas kortelėje atidaro patį įrankį" data-en="The button on each card opens the tool itself"></span>
      </div>
      <div class="mod-list" id="mod-list"></div>
    </div>
  </section>

  <!-- ============ P2: DABAR IR TIKSLINE KRYPTIS ============ -->
  <section class="section" id="state">
    <div class="container">
      <div class="section__head">
        <h2 class="section__title" data-lt="Dabar ir tikslinė kryptis" data-en="Where it stands and where it is heading"></h2>
      </div>
      <div class="statecards">
        <div class="statecard statecard--now">
          <div class="statecard__label" data-lt="Dabar" data-en="Now"></div>
          <p class="statecard__text" id="state-dabar" data-lt="Įrankiai skirtingos brandos. Numatytasis kontekstas - LITGRID (PĮ)." data-en="The tools are at different maturity levels. The default context is LITGRID (PĮ)."></p>
        </div>
        <div class="statecard statecard--next">
          <div class="statecard__label" data-lt="Tikslinė kryptis" data-en="Target direction"></div>
          <p class="statecard__text" data-lt="Tikslas - bendras visos EPSO-G grupės pirkimų skaitmeninis standartas keturioms įmonėms, gerbiant skirtingą teisinį statusą (EPSO-G - VPĮ; LITGRID, Amber Grid, Energy cells - PĮ)." data-en="The goal is a shared digital procurement standard for the whole EPSO-G Group across its four companies, respecting their different legal status (EPSO-G - VPĮ; LITGRID, Amber Grid, Energy cells - PĮ)."></p>
        </div>
      </div>
    </div>
  </section>

  <!-- ============ P5: TEISINIS KONTEKSTAS ============ -->
  <section class="section" id="legal">
    <div class="container">
      <div class="legal-strip">
        <div class="legal-strip__title" data-lt="Teisinis kontekstas" data-en="Legal context"></div>
        <p class="legal-strip__text" data-lt="<strong>UAB EPSO-G</strong> yra perkančioji organizacija, kuriai taikomas Viešųjų pirkimų įstatymas (VPĮ). <strong>LITGRID AB</strong>, <strong>AB Amber Grid</strong> ir <strong>UAB Energy cells</strong> yra perkantieji subjektai, kuriems taikomas Pirkimų, atliekamų vandentvarkos, energetikos, transporto ar pašto paslaugų srities perkančiųjų subjektų įstatymas (PĮ). Numatytasis įrankių kontekstas - LITGRID (PĮ). Įrankių rezultatai yra rekomendacinio pobūdžio: galutinius sprendimus visada priima pirkimo komisija arba atsakingas asmuo." data-en="<strong>UAB EPSO-G</strong> is a contracting authority governed by the Law on Public Procurement (VPĮ). <strong>LITGRID AB</strong>, <strong>AB Amber Grid</strong> and <strong>UAB Energy cells</strong> are contracting entities governed by the Law on Procurement by Contracting Entities in the Water, Energy, Transport and Postal Services Sectors (PĮ). The default context of the tools is LITGRID (PĮ). Tool outputs are advisory: final decisions are always taken by the procurement committee or the responsible person."></p>
      </div>
    </div>
  </section>
</main>

  /* ============================================================

  function el(tag, className) {
    var node = document.createElement(tag);
    if (className) node.className = className;
    return node;
  }

  function setLangAttrs(node, lt, en) {
    node.setAttribute("data-lt", lt);
    node.setAttribute("data-en", en);
  }

  /* Brandos skale - vienoda visose kortelese (vienintelis tiesos saltinis).
     cls valdo taskelio spalva CSS'e: naudojamas=zalias, bandomasis=gintaro,
     kuriamas=pilkas. */
  var MATURITY = {
    naudojamas: { lt: "Naudojamas", en: "In use",        cls: "is-live" },
    bandomasis: { lt: "Bandomasis", en: "Pilot",         cls: "is-pilot" },

  function buildMap() {
    var grid = document.getElementById("map-grid");
    for (var s = 0; s < STAGES.length; s++) {
      var stage = STAGES[s];
      var col = el("div", "stage");

      var head = el("div", "stage__head");
      var num = el("span", "stage__num");
      num.textContent = String(stage.num);
      var title = el("span", "stage__title");
      setLangAttrs(title, stage.lt, stage.en);
      head.appendChild(num);
      head.appendChild(title);
      col.appendChild(head);

      var chips = el("div", "stage__chips");
      for (var m = 0; m < MODULES.length; m++) {
        var mod = MODULES[m];
        if (mod.stage !== stage.num) continue;

        var chip = el("a", "chip chip--" + mod.cat);
        chip.href = "#mod-" + mod.id;
        var code = el("span", "chip__code");
        code.textContent = mod.code;
        var name = el("span", "chip__name");
        setLangAttrs(name, mod.nameLt, mod.nameEn);
        chip.appendChild(code);
        chip.appendChild(name);
        chip.setAttribute("data-lt-aria", "Rodyti aprašymą: " + mod.code);
        chip.setAttribute("data-en-aria", "Show description: " + mod.code);
        chips.appendChild(chip);

        /* P1: palydovas prikabinamas po PP-carbon mazgo */
        if (SATELLITE.afterId === mod.id) {
          var sat = el("a", "chip chip--reporting chip--satellite");
          sat.href = SATELLITE.href;
          sat.target = "_blank";
          sat.rel = "noopener";
          var satName = el("span", "chip__code");
          setLangAttrs(satName, SATELLITE.nameLt, SATELLITE.nameEn);
          var satTag = el("span", "chip__tag");
          setLangAttrs(satTag, SATELLITE.tagLt, SATELLITE.tagEn);
          sat.appendChild(satName);
          sat.appendChild(satTag);
          sat.setAttribute("data-lt-aria", "Atidaryti: Tiekėjo EPD įrankį");
          sat.setAttribute("data-en-aria", "Open: Supplier EPD tool");
          chips.appendChild(sat);
        }
      }
      col.appendChild(chips);
      grid.appendChild(col);
    }

      head.appendChild(badge);
      head.appendChild(status);

      card.appendChild(desc);

      var foot = el("div", "mod-card__foot");
      var open = el("a", "btn-open");
      open.href = mod.href;
      open.target = "_blank";
      open.rel = "noopener";
      var openLabel = el("span");
      setLangAttrs(openLabel, "Atidaryti įrankį", "Open the tool");
      open.appendChild(openLabel);
      open.setAttribute("data-lt-aria", "Atidaryti įrankį: " + mod.code);
      open.setAttribute("data-en-aria", "Open the tool: " + mod.code);
      foot.appendChild(open);

      if (mod.extra) {
        for (var x = 0; x < mod.extra.length; x++) {
          var extra = mod.extra[x];
          var btn = el("a", "btn-secondary");
          btn.href = extra.href;
          btn.target = "_blank";
          btn.rel = "noopener";
          setLangAttrs(btn, extra.labelLt, extra.labelEn);
          foot.appendChild(btn);
        }
      }

      var back = el("a", "back-to-map");
      back.href = "#map";
      setLangAttrs(back, "&#8593; Į žemėlapį", "&#8593; Back to map");
      foot.appendChild(back);

      card.appendChild(foot);
      list.appendChild(card);
    }
  }

  /* Brandos ir kiekio skaiciai skaiciuojami is MODULES (vienas tiesos saltinis),
     kad viesi teiginiai "Dabar" bloke ir pasitikejimo bloke niekada nepasentu,
     jei pasikeicia moduliu skaicius ar brandos zymos. */
  function buildDynamicCounts() {
    var total = MODULES.length;
    var stages = STAGES.length;
    var c = { naudojamas: 0, bandomasis: 0, kuriamas: 0 };
    for (var i = 0; i < MODULES.length; i++) {
      if (c[MODULES[i].maturity] !== undefined) c[MODULES[i].maturity]++;
    }
    var dabar = document.getElementById("state-dabar");
    if (dabar) {
      setLangAttrs(dabar,
        "Įrankiai skirtingos brandos: " + c.naudojamas + " naudojami, " + c.bandomasis + " bandomi, " + c.kuriamas + " kuriami. Numatytasis kontekstas - LITGRID (PĮ).",
        "The tools are at different maturity levels: " + c.naudojamas + " in use, " + c.bandomasis + " in pilot, " + c.kuriamas + " in development. The default context is LITGRID (PĮ).");
    }
    var cikle = document.getElementById("trust-cikle");
    if (cikle) {
      setLangAttrs(cikle,
        total + " savarankiškų įrankių per " + stages + " pirkimo ciklo etapus - nuo planavimo iki ataskaitų ir atitikties.",
        total + " self-contained tools across the " + stages + " procurement-cycle stages - from planning to reporting and compliance.");
    }
  }

  buildMap();
  buildCards();
  buildDynamicCounts();

  /* ============================================================
     DVIKALBYSTE - identiskas mechanizmas kaip portale (index.html).
     Tas pats localStorage raktas, todel kalba sinchronizuojasi.
     ============================================================ */

  var STORAGE_KEY = "gprocure-lang";

  function detectLang() {
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved === "lt" || saved === "en") return saved;
    } catch (e) {}
    try {
      var tz = (Intl.DateTimeFormat().resolvedOptions().timeZone || "");
      if (tz === "Europe/Vilnius") return "lt";
    } catch (e) {}
    var langs = navigator.languages || [navigator.language || navigator.userLanguage || ""];
    for (var i = 0; i < langs.length; i++) {
      if (String(langs[i]).toLowerCase().indexOf("lt") === 0) return "lt";
    }
    return "en";
  }

  /* <title> ir <meta description> gyvena <head> - ju applyLang innerHTML
     mechanizmas nepasiekia, tad perrasom atskirai (pries tai EN rezime jie
     likdavo lietuviski). */
  var META = {
    lt: {
      title: "G-Procure | Apie projektą",
      desc: "G-Procure projekto žemėlapis: visi pirkimų ciklo įrankiai vienoje vietoje. Kuriam modului kokia paskirtis ir kokio rezultato tikėtis."
    },
    en: {
      title: "G-Procure | About the project",
      desc: "The G-Procure project map: all procurement-cycle tools in one place. What each module is for and what result to expect."
    }
  };

  function applyLang(lang) {
    document.documentElement.setAttribute("lang", lang);
    var meta = META[lang] || META.lt;
    document.title = meta.title;
    var descTag = document.querySelector('meta[name="description"]');
    if (descTag) descTag.setAttribute("content", meta.desc);
    var nodes = document.querySelectorAll("[data-lt]");
    for (var i = 0; i < nodes.length; i++) {
      var value = nodes[i].getAttribute("data-" + lang);
      if (value !== null) nodes[i].innerHTML = value;
    }
    var ariaNodes = document.querySelectorAll("[data-lt-aria]");
    for (var j = 0; j < ariaNodes.length; j++) {
      var ariaValue = ariaNodes[j].getAttribute("data-" + lang + "-aria");
      if (ariaValue !== null) ariaNodes[j].setAttribute("aria-label", ariaValue);
    }
    var buttons = document.querySelectorAll(".lang-switch__btn");
    for (var k = 0; k < buttons.length; k++) {
      buttons[k].setAttribute(
        "aria-pressed",
        buttons[k].getAttribute("data-lang") === lang ? "true" : "false"
      );
    }
  }

  applyLang(detectLang());

  document.addEventListener("click", function (event) {
    var btn = event.target.closest ? event.target.closest(".lang-switch__btn") : null;
    if (!btn) return;
    var lang = btn.getAttribute("data-lang");
    try { localStorage.setItem(STORAGE_KEY, lang); } catch (e) {}
    applyLang(lang);
  });
})();
</script>

</body>
</html>
