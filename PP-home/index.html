<style>
  :root {
    /* EPSO-G brand spalvos ir --font-base iškelti į ../shared/epso-g.css (GP dizaino žetonai). */

    --radius-sm: 8px;
    --radius-md: 12px;
    --radius-lg: 16px;
    --radius-xl: 20px;

    --space-1: 8px;
    --space-2: 16px;
    --space-3: 24px;
    --space-4: 32px;
    --space-5: 48px;
    --space-6: 64px;
    --space-7: 96px;

    --container-max: 1200px;

    --shadow-card: 0 1px 2px rgba(46, 54, 65, 0.04);
    --shadow-card-hover: 0 12px 32px rgba(46, 54, 65, 0.08);
    --transition-fast: 180ms ease;
    --transition-med: 240ms ease;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-base);
    font-size: 16px;
    line-height: 1.55;
    color: var(--color-graphite);
    background-color: var(--color-white);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    background-image:
      radial-gradient(1100px 600px at 90% -200px, rgba(22, 196, 146, 0.07), transparent 60%),
      radial-gradient(900px 500px at -10% 0%, rgba(0, 165, 196, 0.05), transparent 55%);
    background-attachment: fixed;
  }

  a { color: inherit; text-decoration: none; }

  .container {
    width: 100%;
    max-width: var(--container-max);
    margin: 0 auto;
    padding: 0 var(--space-3);
  }

  /* Anchor offset below the sticky header */
  #tools { scroll-margin-top: 88px; }

  /* ────────────────  SKIP LINK  ──────────────── */
  .skip-link {
    position: absolute;
    left: -9999px;
    top: 0;
    z-index: 100;
    background: var(--color-emerald);
    color: var(--color-white);
    font-weight: 700;
    font-size: 14px;
    padding: 10px 16px;
    border-radius: 0 0 var(--radius-sm) 0;
  }
  .skip-link:focus { left: 0; }

  /* ────────────────  HEADER  ──────────────── */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: saturate(140%) blur(10px);
    -webkit-backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--color-graphite-15);
  }

  .site-header__inner {
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
  }

  .brand { display: flex; align-items: center; gap: var(--space-2); }

  .brand__logo { height: 28px; width: auto; flex-shrink: 0; }

  .brand__divider { width: 1px; height: 26px; background: var(--color-graphite-15); }

  .brand__product { display: flex; flex-direction: column; line-height: 1.1; }

  .brand__product-name {
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.01em;
    color: var(--color-graphite);
  }
  .brand__product-name em { color: var(--color-emerald); font-style: normal; }

  .brand__product-tag {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--color-graphite-50);
    margin-top: 2px;
  }

  .site-header__actions { display: flex; align-items: center; gap: var(--space-2); }

  .nav-link {
    font-size: 14px;
    font-weight: 600;
    color: var(--color-graphite-50);
    transition: color var(--transition-fast);
    white-space: nowrap;
  }
  .nav-link:hover { color: var(--color-emerald); }
  .nav-link:focus-visible { outline: 2px solid var(--color-emerald); outline-offset: 2px; border-radius: 4px; }

  .header-meta {
    display: flex;
    align-items: center;
    gap: var(--space-1);
    font-size: 13px;
    color: var(--color-graphite-50);
    white-space: nowrap;
  }
  .header-meta__dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--color-emerald);
    box-shadow: 0 0 0 4px rgba(0, 160, 114, 0.12);
  }

  .lang-switch {
    display: inline-flex;
    border: 1px solid var(--color-graphite-15);
    border-radius: 999px;
    padding: 3px;
    background: var(--color-white);
  }
  .lang-switch__btn {
    border: 0;
    background: transparent;
    font-family: var(--font-base);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--color-graphite-50);
    padding: 5px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: background var(--transition-fast), color var(--transition-fast);
  }
  .lang-switch__btn:hover { color: var(--color-graphite); }
  .lang-switch__btn[aria-pressed="true"] { background: var(--color-emerald); color: var(--color-white); }
  .lang-switch__btn:focus-visible { outline: 2px solid var(--color-emerald); outline-offset: 2px; }

  /* ────────────────  HERO  ──────────────── */
  .hero { padding: var(--space-7) 0 var(--space-6); position: relative; }

  .hero__eyebrow {
    display: inline-flex;
    align-items: center;
    gap: var(--space-1);
    padding: 6px 12px;
    background: var(--color-green-5);
    color: var(--color-emerald-120);
    border: 1px solid var(--color-green-15);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: var(--space-3);
  }

  .hero__title {
    font-size: clamp(40px, 6vw, 64px);
    font-weight: 800;
    letter-spacing: -0.025em;
    color: var(--color-graphite);
    line-height: 1.05;
    margin-bottom: var(--space-3);
  }
  .hero__title em { color: var(--color-emerald); font-style: normal; }

  .hero__lead {
    font-size: clamp(17px, 1.6vw, 19px);
    color: var(--color-graphite-50);
    max-width: 720px;
    line-height: 1.6;
  }

  /* ────────────────  SECTIONS  ──────────────── */
  .section { padding: var(--space-5) 0 var(--space-6); }

  .section__head {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    gap: var(--space-3);
    margin-bottom: var(--space-4);
    flex-wrap: wrap;
  }
  .section__title {
    font-size: 24px;
    font-weight: 800;
    color: var(--color-graphite);
    letter-spacing: -0.015em;
  }
  .section__hint { font-size: 13px; color: var(--color-graphite-50); }

  /* ────────────────  PROJECT GRID  ──────────────── */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: var(--space-3);
  }

  .card {
    position: relative;
    display: flex;
    flex-direction: column;
    background: var(--color-white);
    border: 1px solid var(--color-graphite-15);
    border-radius: var(--radius-lg);
    padding: var(--space-3);
    box-shadow: var(--shadow-card);
    transition: border-color var(--transition-fast),
                box-shadow var(--transition-med),
                transform var(--transition-med);
    overflow: hidden;
    isolation: isolate;
  }
  .card::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, var(--color-green-5) 0%, transparent 70%);
    opacity: 0;
    transition: opacity var(--transition-med);
    z-index: -1;
  }
  .card:hover {
    border-color: var(--color-emerald-50);
    box-shadow: var(--shadow-card-hover);
    transform: translateY(-2px);
  }
  .card:hover::before { opacity: 1; }
  .card:focus-within { outline: 2px solid var(--color-emerald); outline-offset: 2px; }

  .card__top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: var(--space-2);
    margin-bottom: var(--space-3);
  }

  .card__icon {
    width: 48px;
    height: 48px;
    display: grid;
    place-items: center;
    border-radius: var(--radius-md);
    background: var(--color-green-5);
    border: 1px solid var(--color-green-15);
    color: var(--color-emerald);
    transition: background var(--transition-fast), color var(--transition-fast);
    flex-shrink: 0;
  }
  .card:hover .card__icon { background: var(--color-emerald); color: var(--color-white); }
  .card__icon svg {
    width: 24px; height: 24px;
    stroke: currentColor; stroke-width: 1.5; fill: none;
    stroke-linecap: round; stroke-linejoin: round;
  }

  .card__badge {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--color-graphite-5);
    color: var(--color-graphite-50);
    border: 1px solid var(--color-graphite-15);
    white-space: nowrap;
  }
  .card__badge--planning { background: var(--color-cyan-5); color: var(--color-blue); border-color: rgba(0, 102, 125, 0.18); }
  .card__badge--analysis { background: #FFF8E8; color: #8C6A1F; border-color: #F4E4BD; }
  .card__badge--execution { background: var(--color-green-5); color: var(--color-emerald-120); border-color: var(--color-green-15); }
  .card__badge--reporting { background: #F2EBFF; color: #5B3DAA; border-color: #DBCDF7; }

  .card__title {
    font-size: 20px;
    font-weight: 800;
    color: var(--color-graphite);
    letter-spacing: -0.012em;
    margin-bottom: 6px;
  }
  .card__subtitle {
    font-size: 13px;
    font-weight: 700;
    color: var(--color-emerald);
    letter-spacing: 0.02em;
    text-transform: uppercase;
    margin-bottom: var(--space-2);
  }
  .card__desc {
    color: var(--color-graphite-50);
    font-size: 14.5px;
    line-height: 1.55;
    margin-bottom: var(--space-3);
    flex-grow: 1;
  }
  .card__footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: var(--space-2);
    border-top: 1px solid var(--color-graphite-15);
  }
  .card__link {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
    font-weight: 700;
    color: var(--color-emerald);
    transition: color var(--transition-fast);
  }
  .card__link::after {
    content: "→";
    font-size: 18px;
    line-height: 1;
    transition: transform var(--transition-fast);
  }
  .card:hover .card__link { color: var(--color-emerald-120); }
  .card:hover .card__link::after { transform: translateX(4px); }
  .card__stretched-link { position: absolute; inset: 0; z-index: 1; }
  .card__owner {
    font-size: 12px;
    color: var(--color-graphite-50);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card__owner-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--color-emerald-50); }

  /* ────────────────  REVEAL ON SCROLL  ──────────────── */
  .js .reveal {
    opacity: 0;
    transform: translateY(14px);
    transition: opacity 500ms ease, transform 500ms ease;
  }
  .js .reveal.is-visible { opacity: 1; transform: none; }
  @media (prefers-reduced-motion: reduce) {
    html { scroll-behavior: auto; }
    .js .reveal { opacity: 1; transform: none; transition: none; }
    .card, .card:hover { transform: none; }
  }

  /* ────────────────  FOOTER  ──────────────── */
  .footer {
    margin-top: var(--space-6);
    padding: var(--space-4) 0;
    border-top: 1px solid var(--color-graphite-15);
    background: var(--color-white);
  }
  .footer__inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: var(--space-3);
    flex-wrap: wrap;
  }
  .footer__brand {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    font-size: 13px;
    color: var(--color-graphite-50);
  }
  .footer__brand img { height: 22px; width: auto; opacity: 0.85; }
  .footer__meta { font-size: 12px; color: var(--color-graphite-50); letter-spacing: 0.02em; }
  .footer__meta a {
    color: var(--color-graphite);
    font-weight: 600;
    border-bottom: 1px solid var(--color-graphite-15);
    transition: color var(--transition-fast), border-color var(--transition-fast);
  }
  .footer__meta a:hover { color: var(--color-emerald); border-color: var(--color-emerald); }

  /* ────────────────  RESPONSIVE  ──────────────── */
  @media (max-width: 640px) {
    .site-header__inner { height: 64px; }
    .brand__product-tag { display: none; }
    .header-meta { display: none; }
    .hero { padding: var(--space-5) 0 var(--space-4); }
    .grid { grid-template-columns: 1fr; }
    .card__top { flex-direction: column; gap: var(--space-2); }
  }
</style>
</head>

<script>
(function () {
  var STORAGE_KEY = "gprocure-lang";

  function detectLang() {
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved === "lt" || saved === "en") return saved;
    } catch (e) {}
    // Location proxy: a visitor physically in Lithuania resolves to Europe/Vilnius.
    try {
      var tz = (Intl.DateTimeFormat().resolvedOptions().timeZone || "");
      if (tz === "Europe/Vilnius") return "lt";
    } catch (e) {}
    // Secondary signal: a Lithuanian-language browser locale.
    var langs = navigator.languages || [navigator.language || navigator.userLanguage || ""];
    for (var i = 0; i < langs.length; i++) {
      if (String(langs[i]).toLowerCase().indexOf("lt") === 0) return "lt";
    }
    // Default for everyone abroad.
    return "en";
  }

  function applyLang(lang) {
    document.documentElement.setAttribute("lang", lang);

    var nodes = document.querySelectorAll("[data-lt]");
    for (var i = 0; i < nodes.length; i++) {
      var value = nodes[i].getAttribute("data-" + lang);
      if (value !== null) nodes[i].innerHTML = value;
    }

    var ariaNodes = document.querySelectorAll("[data-lt-aria]");
    for (var j = 0; j < ariaNodes.length; j++) {
      var ariaValue = ariaNodes[j].getAttribute("data-" + lang + "-aria");
      if (ariaValue !== null) ariaNodes[j].setAttribute("aria-label", ariaValue);
    }

    var buttons = document.querySelectorAll(".lang-switch__btn");
    for (var k = 0; k < buttons.length; k++) {
      buttons[k].setAttribute(
        "aria-pressed",
        buttons[k].getAttribute("data-lang") === lang ? "true" : "false"
      );
    }
  }

  applyLang(detectLang());

  document.addEventListener("click", function (event) {
    var btn = event.target.closest ? event.target.closest(".lang-switch__btn") : null;
    if (!btn) return;
    var lang = btn.getAttribute("data-lang");
    try { localStorage.setItem(STORAGE_KEY, lang); } catch (e) {}
    applyLang(lang);
  });

  // ── Reveal on scroll ──
  var revealEls = document.querySelectorAll(".reveal");
  if ("IntersectionObserver" in window) {
    var io = new IntersectionObserver(function (entries) {
      for (var i = 0; i < entries.length; i++) {
        if (entries[i].isIntersecting) {
          entries[i].target.classList.add("is-visible");
          io.unobserve(entries[i].target);
        }
      }
    }, { rootMargin: "0px 0px -8% 0px", threshold: 0.05 });
    for (var r = 0; r < revealEls.length; r++) io.observe(revealEls[r]);
  } else {
    for (var f = 0; f < revealEls.length; f++) revealEls[f].classList.add("is-visible");
  }
})();
</script>
