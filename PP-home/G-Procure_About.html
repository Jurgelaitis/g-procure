<style>
  :root {
    /* EPSO-G brand spalvos, --font-base ir maketo zetonai (radius/space/container/
       transition) iskelti i ../shared/epso-g.css (GP dizaino zetonai). */

    --shadow-card: 0 1px 2px rgba(46, 54, 65, 0.04);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }

  body {
    font-family: var(--font-base);
    font-size: 16px;
    line-height: 1.55;
    color: var(--color-graphite);
    background-color: var(--color-white);
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    min-height: 100vh;
    background-image:
      radial-gradient(1100px 600px at 90% -200px, rgba(22, 196, 146, 0.07), transparent 60%),
      radial-gradient(900px 500px at -10% 0%, rgba(0, 165, 196, 0.05), transparent 55%);
    background-attachment: fixed;
  }

  a { color: inherit; text-decoration: none; }

  .container {
    width: 100%;
    max-width: var(--container-max);
    margin: 0 auto;
    padding: 0 var(--space-3);
  }

  /* ────────────────  HEADER  ──────────────── */
  .site-header {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(255, 255, 255, 0.85);
    backdrop-filter: saturate(140%) blur(10px);
    -webkit-backdrop-filter: saturate(140%) blur(10px);
    border-bottom: 1px solid var(--color-graphite-15);
  }
  .site-header__inner {
    height: 72px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: var(--space-3);
  }
  .brand { display: flex; align-items: center; gap: var(--space-2); }
  .brand:hover .brand__product-name { color: var(--color-emerald-120); }
  .brand__logo { height: 28px; width: auto; flex-shrink: 0; }
  .brand__divider { width: 1px; height: 26px; background: var(--color-graphite-15); }
  .brand__product { display: flex; flex-direction: column; line-height: 1.1; }
  .brand__product-name {
    font-size: 17px;
    font-weight: 800;
    letter-spacing: -0.01em;
    color: var(--color-graphite);
    transition: color var(--transition-fast);
  }
  .brand__product-name em { color: var(--color-emerald); font-style: normal; }
  .brand__product-tag {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: var(--color-graphite-50);
    margin-top: 2px;
  }
  .site-header__actions { display: flex; align-items: center; gap: var(--space-2); }
  .nav-link {
    font-size: 14px;
    font-weight: 600;
    color: var(--color-graphite-50);
    transition: color var(--transition-fast);
    white-space: nowrap;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .nav-link:hover { color: var(--color-emerald); }
  .nav-link__arrow { font-size: 16px; line-height: 1; transition: transform var(--transition-fast); }
  .nav-link:hover .nav-link__arrow { transform: translateX(-3px); }
  .lang-switch {
    display: inline-flex;
    border: 1px solid var(--color-graphite-15);
    border-radius: 999px;
    padding: 3px;
    background: var(--color-white);
  }
  .lang-switch__btn {
    border: 0;
    background: transparent;
    font-family: var(--font-base);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.04em;
    color: var(--color-graphite-50);
    padding: 5px 12px;
    border-radius: 999px;
    cursor: pointer;
    transition: background var(--transition-fast), color var(--transition-fast);
  }
  .lang-switch__btn:hover { color: var(--color-graphite); }
  .lang-switch__btn[aria-pressed="true"] { background: var(--color-emerald); color: var(--color-white); }
  .lang-switch__btn:focus-visible { outline: 2px solid var(--color-emerald); outline-offset: 2px; }

  /* ────────────────  PAGE INTRO  ──────────────── */
  .page-intro { padding: var(--space-6) 0 var(--space-4); }
  .page-intro__eyebrow {
    display: inline-flex;
    align-items: center;
    padding: 6px 12px;
    background: var(--color-green-5);
    color: var(--color-emerald-120);
    border: 1px solid var(--color-green-15);
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: var(--space-3);
  }
  .page-intro__title {
    font-size: clamp(32px, 4vw, 44px);
    font-weight: 800;
    letter-spacing: -0.02em;
    color: var(--color-graphite);
    line-height: 1.1;
  }

  /* ────────────────  AUTHOR  ──────────────── */
  .author-section { padding: 0 0 var(--space-6); }
  .author__card {
    display: grid;
    grid-template-columns: 360px 1fr;
    background: var(--color-white);
    border: 1px solid var(--color-graphite-15);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-card);
    overflow: hidden;
  }

  .author__identity {
    background:
      radial-gradient(circle at 30% 0%, rgba(22, 196, 146, 0.18), transparent 55%),
      linear-gradient(160deg, #15413d 0%, #0b2a33 100%);
    padding: var(--space-5) var(--space-4);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    position: relative;
  }

  .author__photo-wrap {
    margin-bottom: var(--space-3);
    position: relative;
  }
  .author__photo {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    object-fit: cover;
    object-position: center 25%;
    display: block;
    box-shadow:
      0 0 0 4px rgba(22, 196, 146, 0.55),
      0 0 0 10px rgba(22, 196, 146, 0.12),
      0 16px 32px rgba(0, 0, 0, 0.4);
  }

  .author__name {
    font-size: 24px;
    font-weight: 800;
    color: var(--color-white);
    letter-spacing: -0.01em;
  }
  .author__role {
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--color-emerald-50);
    margin-top: var(--space-1);
  }
  .author__company {
    font-size: 14px;
    color: var(--color-graphite-30);
    margin-top: 4px;
  }

  .author__body { padding: var(--space-5); }
  .author__bio {
    font-size: 16px;
    line-height: 1.7;
    color: var(--color-graphite);
    max-width: 680px;
    margin-bottom: var(--space-4);
  }
  .author__contacts {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: var(--space-3) var(--space-4);
    padding-top: var(--space-3);
    border-top: 1px solid var(--color-graphite-15);
  }
  .author__contact { display: flex; gap: var(--space-2); align-items: flex-start; }
  .author__contact-icon {
    width: 40px; height: 40px;
    flex-shrink: 0;
    border-radius: var(--radius-sm);
    background: var(--color-green-5);
    border: 1px solid var(--color-green-15);
    color: var(--color-emerald);
    display: grid;
    place-items: center;
  }
  .author__contact-icon svg {
    width: 18px; height: 18px;
    stroke: currentColor; stroke-width: 1.5; fill: none;
    stroke-linecap: round; stroke-linejoin: round;
  }
  .author__contact-text { display: flex; flex-direction: column; min-width: 0; }
  .author__contact-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--color-graphite-50);
    margin-bottom: 2px;
  }
  .author__contact-value { font-size: 14px; color: var(--color-graphite); word-break: break-word; }
  .author__contact-value a {
    color: var(--color-emerald);
    font-weight: 600;
    transition: color var(--transition-fast);
  }
  .author__contact-value a:hover { color: var(--color-emerald-120); }

  /* ────────────────  FOOTER  ──────────────── */
  .footer {
    margin-top: var(--space-6);
    padding: var(--space-4) 0;
    border-top: 1px solid var(--color-graphite-15);
    background: var(--color-white);
  }
  .footer__inner {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: var(--space-3);
    flex-wrap: wrap;
  }
  .footer__brand {
    display: flex;
    align-items: center;
    gap: var(--space-2);
    font-size: 13px;
    color: var(--color-graphite-50);
  }
  .footer__meta { font-size: 12px; color: var(--color-graphite-50); letter-spacing: 0.02em; }
  .footer__meta a {
    color: var(--color-graphite);
    font-weight: 600;
    border-bottom: 1px solid var(--color-graphite-15);
    transition: color var(--transition-fast), border-color var(--transition-fast);
  }
  .footer__meta a:hover { color: var(--color-emerald); border-color: var(--color-emerald); }

  /* ────────────────  RESPONSIVE  ──────────────── */
  @media (max-width: 860px) {
    .author__card { grid-template-columns: 1fr; }
    .author__identity { padding: var(--space-4); align-items: center; text-align: center; }
    .author__body { padding: var(--space-4) var(--space-3); }
    .author__contacts { grid-template-columns: 1fr; }
  }
  @media (max-width: 640px) {
    .site-header__inner { height: 64px; }
    .brand__product-tag { display: none; }
    .page-intro { padding: var(--space-4) 0 var(--space-3); }
    .author__photo { width: 140px; height: 140px; }
  }
</style>
</head>

  <!-- ════════ AUTHOR ════════ -->
  <section class="author-section">
    <div class="container">
      <div class="author__card">
        <aside class="author__identity">
          <div class="author__photo-wrap">
            <img class="author__photo" src="AJ%20photo.jpg" alt="Arūnas Jurgelaitis" />
          </div>
          <div class="author__name">Arūnas Jurgelaitis</div>
          <div class="author__role" data-lt="Pirkimų skyriaus vadovas" data-en="Head of Procurement Division"></div>
          <div class="author__company">AB „Litgrid“</div>
        </aside>

        <div class="author__body">
          <p class="author__bio" data-lt="Pirkimų funkcijos vadovas AB „Litgrid“, Lietuvos elektros perdavimo sistemos operatoriuje ir nacionalinės svarbos energetikos infrastruktūros įmonėje. Atsakomybės sritis apima viešųjų pirkimų valdymą pagal Pirkimų, atliekamų vandentvarkos, energetikos, transporto ar pašto paslaugų srities perkančiųjų subjektų, įstatymą (PSĮ), strateginį pirkimų planavimą, tiekėjų santykių valdymą, pirkimų rizikų valdymą ir procesų skaitmeninimą. G-Procure platforma yra šio darbo tęsinys: iniciatyva, kuria sudėtingi pirkimų procesai paverčiami skaidresniais, efektyvesniais ir patogiau pasiekiamais visai EPSO-G grupei." data-en="Head of the procurement function at Litgrid AB, Lithuania's electricity transmission system operator and a critical national energy infrastructure company. The role spans public procurement governance under the Law on Procurement by Contracting Entities in the Water, Energy, Transport and Postal Services Sectors (PSĮ), strategic procurement planning, supplier relationship management, procurement risk management and process digitalisation. The G-Procure platform is a continuation of that work: an initiative to make complex procurement processes more transparent, efficient and accessible across the EPSO-G Group."></p>

          <div class="author__contacts">
            <div class="author__contact">
              <span class="author__contact-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M12 21s7-5.5 7-11a7 7 0 1 0-14 0c0 5.5 7 11 7 11Z"/><circle cx="12" cy="10" r="2.5"/></svg>
              </span>

                <span class="author__contact-value" data-lt="Karlo Gustavo Emilio Manerheimo g. 8, 05131 Vilnius, Lietuva" data-en="Karlo Gustavo Emilio Manerheimo g. 8, 05131 Vilnius, Lithuania"></span>
              </span>
            </div>

            <div class="author__contact">
              <span class="author__contact-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24"><path d="M5 4h4l2 5-2.5 1.5a11 11 0 0 0 5 5L16 13l5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 5a2 2 0 0 1 2-1Z"/></svg>

<script>
(function () {
  var STORAGE_KEY = "gprocure-lang";

  function detectLang() {
    try {
      var saved = localStorage.getItem(STORAGE_KEY);
      if (saved === "lt" || saved === "en") return saved;
    } catch (e) {}
    try {
      var tz = (Intl.DateTimeFormat().resolvedOptions().timeZone || "");
      if (tz === "Europe/Vilnius") return "lt";
    } catch (e) {}
    var langs = navigator.languages || [navigator.language || navigator.userLanguage || ""];
    for (var i = 0; i < langs.length; i++) {
      if (String(langs[i]).toLowerCase().indexOf("lt") === 0) return "lt";
    }
    return "en";
  }

  function applyLang(lang) {
    document.documentElement.setAttribute("lang", lang);
    var nodes = document.querySelectorAll("[data-lt]");
    for (var i = 0; i < nodes.length; i++) {
      var value = nodes[i].getAttribute("data-" + lang);
      if (value !== null) nodes[i].innerHTML = value;
    }
    var ariaNodes = document.querySelectorAll("[data-lt-aria]");
    for (var j = 0; j < ariaNodes.length; j++) {
      var ariaValue = ariaNodes[j].getAttribute("data-" + lang + "-aria");
      if (ariaValue !== null) ariaNodes[j].setAttribute("aria-label", ariaValue);
    }
    var buttons = document.querySelectorAll(".lang-switch__btn");
    for (var k = 0; k < buttons.length; k++) {
      buttons[k].setAttribute(
        "aria-pressed",
        buttons[k].getAttribute("data-lang") === lang ? "true" : "false"
      );
    }
  }

  applyLang(detectLang());

  document.addEventListener("click", function (event) {
    var btn = event.target.closest ? event.target.closest(".lang-switch__btn") : null;
    if (!btn) return;
    var lang = btn.getAttribute("data-lang");
    try { localStorage.setItem(STORAGE_KEY, lang); } catch (e) {}
    applyLang(lang);
  });
})();
</script>
