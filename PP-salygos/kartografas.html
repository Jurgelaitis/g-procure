<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PP-salygos - sablono kartografas</title>
<style>
  :root{ --z:#00a072; --z2:#00805a; --r:#d64545; --g:#8a97a8; --bg:#f5f7f9; --br:#dde4ea; }
  *{box-sizing:border-box}
  body{font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;margin:0;background:var(--bg);color:#1a2330}
  header{background:#0f1720;color:#fff;padding:18px 28px}
  header h1{margin:0;font-size:19px;font-weight:650}
  header p{margin:4px 0 0;font-size:13px;color:#9fb0c0}
  main{max-width:1180px;margin:0 auto;padding:22px 28px 80px}
  .bar{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:18px}
  select,button{font:inherit}
  select{padding:8px 10px;border:1px solid var(--br);border-radius:7px;background:#fff}
  button{background:var(--z);color:#fff;border:0;padding:9px 15px;border-radius:7px;cursor:pointer;font-weight:600}
  button.sec{background:#fff;color:#33414f;border:1px solid var(--br);font-weight:500}
  button:disabled{opacity:.45;cursor:default}
  .kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:22px}
  .kpi{background:#fff;border:1px solid var(--br);border-radius:10px;padding:13px 15px}
  .kpi b{display:block;font-size:25px;line-height:1.2}
  .kpi span{font-size:12px;color:var(--g)}
  h2{font-size:15px;margin:26px 0 12px;padding-bottom:7px;border-bottom:2px solid var(--br)}
  .blk{background:#fff;border:1px solid var(--br);border-left:4px solid var(--br);border-radius:9px;padding:14px 16px;margin-bottom:11px}
  .blk.tikrinti{border-left-color:#e8a33d}
  .blk.ok{border-left-color:var(--z)}
  .q{font-weight:650;font-size:14px;color:#0f1720}
  .meta{font-size:12px;color:var(--g);margin:5px 0 9px;display:flex;gap:14px;flex-wrap:wrap}
  .tag{background:var(--bg);border:1px solid var(--br);border-radius:20px;padding:1px 9px}
  .tag.warn{background:#fff6e6;border-color:#e8c583;color:#8a5d00}
  .tag.pair{background:#e8f7f2;border-color:#9ad9c3;color:#00674a}
  .lines{border-left:2px solid #e9eff4;padding-left:12px;margin:8px 0}
  .ln{font-size:13px;padding:2px 0;color:#33414f}
  .ln .n{color:#b6c1cc;font-size:11px;margin-right:7px}
  .ln.red{color:var(--r)}
  .ln.out{opacity:.4;font-style:italic}
  .acts{display:flex;gap:6px;margin-top:9px;align-items:center}
  .acts button{padding:5px 10px;font-size:12px;font-weight:500}
  .note{background:#fff;border:1px solid var(--br);border-radius:8px;padding:9px 13px;margin-bottom:7px;font-size:13px}
  .note .n{color:#b6c1cc;font-size:11px;margin-right:8px}
  .kom{background:#fff;border:1px solid var(--br);border-radius:8px;padding:10px 13px;margin-bottom:7px;font-size:13px}
  .kom .a{color:#33414f;font-size:12px}
  .kom .c{color:#8a5d00;background:#fff9ee;border-radius:5px;padding:5px 8px;margin-top:5px}
  pre{background:#0f1720;color:#d6e2ef;padding:13px;border-radius:8px;overflow:auto;font-size:11.5px;max-height:340px}
</style>
</head>
<body>
<header>
  <h1>Sablono kartografas</h1>
  <p>Vienkartinis ekspertinis zingsnis: irankis suranda visas sablono autoriu palikas salygas, ekspertas patvirtina ju ribas. Generavimas veliau nieko nespeja.</p>
</header>
<main>
  <div class="bar">
    <select id="tpl">
      <option value="templates/TSD_LT_BPS.docx">TSD - LT - Bendrosios</option>
      <option value="templates/TSD_LT_SPS.docx">TSD - LT - Specialiosios</option>
      <option value="templates/TSD_LT_PARAISKA.docx">TSD - LT - Paraiskos forma</option>
      <option value="templates/TSD_LT_PASIULYMAS.docx">TSD - LT - Pasiulymo forma</option>
      <option value="templates/TSD_LTEN_BPS.docx">TSD - LT/EN - Bendrosios</option>
      <option value="templates/TSD_LTEN_SPS.docx">TSD - LT/EN - Specialiosios</option>
      <option value="templates/TSD_LTEN_PARAISKA.docx">TSD - LT/EN - Paraiskos forma</option>
      <option value="templates/TSD_LTEN_PASIULYMAS.docx">TSD - LT/EN - Pasiulymo forma</option>
      <option value="templates/AK_LT_BPS.docx">AK - LT - Bendrosios</option>
      <option value="templates/AK_LT_SPS.docx">AK - LT - Specialiosios</option>
      <option value="templates/AK_LT_PASIULYMAS.docx">AK - LT - Pasiulymo forma</option>
      <option value="templates/AK_LTEN_BPS.docx">AK - LT/EN - Bendrosios</option>
      <option value="templates/AK_LTEN_SPS.docx">AK - LT/EN - Specialiosios</option>
      <option value="templates/AK_LTEN_PASIULYMAS.docx">AK - LT/EN - Pasiulymo forma</option>
      <option value="templates/SSD_LT_BPS.docx">SSD - LT - Bendrosios</option>
      <option value="templates/SSD_LT_SPS.docx">SSD - LT - Specialiosios</option>
      <option value="templates/SSD_LTEN_BPS.docx">SSD - LT/EN - Bendrosios</option>
      <option value="templates/SSD_LTEN_SPS.docx">SSD - LT/EN - Specialiosios</option>
      <option value="templates/ND_LT_BPS.docx">ND - LT - Bendrosios</option>
      <option value="templates/ND_LT_SPS.docx">ND - LT - Specialiosios</option>
      <option value="templates/ND_LTEN_BPS.docx">ND - LT/EN - Bendrosios</option>
      <option value="templates/ND_LTEN_SPS.docx">ND - LT/EN - Specialiosios</option>
      <option value="templates/MVP_LT_BPS.docx">MVP - LT - Bendrosios</option>
      <option value="templates/MVP_LT_SPS.docx">MVP - LT - Specialiosios</option>
      <option value="templates/MVP_LT_PASIULYMAS.docx">MVP - LT - Pasiulymo forma</option>
      <option value="templates/MVP_LTEN_BPS.docx">MVP - LT/EN - Bendrosios</option>
      <option value="templates/MVP_LTEN_SPS.docx">MVP - LT/EN - Specialiosios</option>
      <option value="templates/MVP_LTEN_PASIULYMAS.docx">MVP - LT/EN - Pasiulymo forma</option>
      <option value="templates/DPSK_LT_SALYGOS.docx">DPS sukurimas - LT - Pirkimo salygos</option>
      <option value="templates/DPSK_LTEN_PARAISKA.docx">DPS sukurimas - LT/EN - Paraiskos forma</option>
      <option value="templates/DPSK_LTEN_SALYGOS.docx">DPS sukurimas - LT/EN - Pirkimo salygos</option>
      <option value="templates/DPSK_LTEN_PASALINIMAS.docx">DPS sukurimas - LT/EN - 1 priedas Pasalinimo pagrindai</option>
      <option value="templates/DPSK_LTEN_KVALIFIKACIJA.docx">DPS sukurimas - LT/EN - 2 priedas Kvalifikacija</option>
      <option value="templates/DPSK_LTEN_SUTARTYS.docx">DPS sukurimas - LT/EN - 5 priedas Sutarciu sarasas</option>
      <option value="templates/DPSK_LTEN_SPECIALISTAI.docx">DPS sukurimas - LT/EN - 6 priedas Specialistai</option>
      <option value="templates/DPSK_LTEN_SUBTIEKEJAS.docx">DPS sukurimas - LT/EN - Priedelis Sutikimas but subtiekeju</option>
      <option value="templates/DPSK_LTEN_IDARBINTAS.docx">DPS sukurimas - LT/EN - Priedelis Sutikimas but idarbintu</option>
      <option value="templates/DPSP_LT_PASIULYMAS.docx">DPS konkretus pirkimas - LT - Pasiulymo forma</option>
      <option value="templates/DPSP_LT_SALYGOS.docx">DPS konkretus pirkimas - LT - Pirkimo salygos</option>
      <option value="templates/DPSP_LTEN_PASIULYMAS.docx">DPS konkretus pirkimas - LT/EN - Pasiulymo forma</option>
      <option value="templates/DPSP_LTEN_SALYGOS.docx">DPS konkretus pirkimas - LT/EN - Pirkimo salygos</option>
      <option value="templates/DPSP_LTEN_SUBTIEKEJAS.docx">DPS konkretus pirkimas - LT/EN - Priedelis Sutikimas but subtiekeju</option>
      <option value="templates/DPSP_LTEN_IDARBINTAS.docx">DPS konkretus pirkimas - LT/EN - Priedelis Sutikimas but idarbintu</option>
      <option value="templates/PRIEDAI_LT_KONFIDENCIALUMAS.docx">Priedai - LT - Konfidencialumo isipareigojimas</option>
      <option value="templates/PRIEDAI_LTEN_KONFIDENCIALUMAS.docx">Priedai - LT/EN - Konfidencialumo isipareigojimas</option>
      <option value="templates/PRIEDAI_LT_NACSAUGUMAS.docx">Priedai - LT - Nac. saugumo deklaracija</option>
      <option value="templates/PRIEDAI_LTEN_NACSAUGUMAS.docx">Priedai - LT/EN - Nac. saugumo deklaracija</option>
      <option value="templates/PRIEDAI_LT_KONFINFO.docx">Priedai - LT - Konfidenciali informacija</option>
      <option value="templates/PRIEDAI_LTEN_KONFINFO.docx">Priedai - LT/EN - Konfidenciali informacija</option>
      <option value="templates/PRIEDAI_LT_SUBTIEKEJAI.docx">Priedai - LT - Info apie subtiekejus</option>
      <option value="templates/PRIEDAI_LTEN_SUBTIEKEJAI.docx">Priedai - LT/EN - Info apie subtiekejus</option>
      <option value="templates/PRIEDAI_LT_SUTARTYS.docx">Priedai - LT - Sutarciu sarasas</option>
      <option value="templates/PRIEDAI_LTEN_SUTARTYS.docx">Priedai - LT/EN - Sutarciu sarasas</option>
      <option value="templates/PRIEDAI_LT_SPECIALISTAI.docx">Priedai - LT - Specialistu sarasas</option>
      <option value="templates/PRIEDAI_LTEN_SPECIALISTAI.docx">Priedai - LT/EN - Specialistu sarasas</option>
      <option value="templates/PRIEDAI_LT_SANDORIS.docx">Priedai - LT - Sandorio salies duomenys</option>
      <option value="templates/PRIEDAI_LTEN_SANDORIS.docx">Priedai - LT/EN - Sandorio salies duomenys</option>
      <option value="templates/PRIEDAI_LT_DERYBOS.docx">Priedai - LT - Pasiulymu deryboms forma</option>
      <option value="templates/PRIEDAI_LTEN_DERYBOS.docx">Priedai - LT/EN - Pasiulymu deryboms forma</option>
    </select>
    <button id="scan">Kartografuoti</button>
    <button id="exp" class="sec" disabled>Eksportuoti zemelapi (JSON)</button>
    <span id="prog" style="font-size:13px;color:var(--g)"></span>
  </div>
  <div id="out"></div>
</main>

<script src="vendor/jszip.min.js"></script>
<script src="variklis.js"></script>
<script>
let MAP = null, SCAN = null;
const $ = s => document.querySelector(s);
const esc = s => String(s??'').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

async function scan(){
  $('#prog').textContent = 'skaitau sablona...';
  const buf = await (await fetch($('#tpl').value)).arrayBuffer();
  const doc = await GPDocx.open(buf);
  SCAN = await GPMap.scan(doc);
  MAP = { sablonas: $('#tpl').value, blokai: SCAN.blocks };
  render();
  $('#exp').disabled = false;
  $('#prog').textContent = '';
}

function lineHtml(p, inBlock){
  const cls = p.state === 'red' ? 'red' : (p.state === 'inline' ? '' : '');
  return `<div class="ln ${cls} ${inBlock?'':'out'}"><span class="n">${p.i}</span>${esc(p.text.slice(0,120))}${p.text.length>120?'...':''}</div>`;
}

function render(){
  const S = SCAN, B = MAP.blokai;
  const tikrinti = B.filter(b => b.ribos === 'TIKRINTI').length;
  const poros = B.filter(b => b.pora).length;

  let h = `<div class="kpis">
    <div class="kpi"><b>${B.length}</b><span>salygu (raudonos "Jei")</span></div>
    <div class="kpi"><b>${poros}</b><span>isskirtiniu poru</span></div>
    <div class="kpi"><b style="color:#c98a00">${tikrinti}</b><span>ribu tikrinti</span></div>
    <div class="kpi"><b>${S.komentarai.length}</b><span>komentaru taisykliu</span></div>
    <div class="kpi"><b>${S.blanks.length + S.inlines.length}</b><span>tusciu vietu / intarpu</span></div>
  </div>`;

  h += `<h2>1. Salygos ir ju blokai <span style="font-weight:400;color:var(--g);font-size:12px">- patvirtinkite, kurios pastraipos priklauso salygai</span></h2>`;
  B.forEach(b => {
    const st = b.patvirtinta ? 'ok' : (b.ribos === 'TIKRINTI' ? 'tikrinti' : '');
    const from = b.blokas?.nuo, to = b.blokas?.iki;
    let lines = '';
    if (b.blokas){
      for (let i = from; i <= Math.min(to + 2, S.paras.length - 1); i++){
        const p = S.paras[i];
        if (!p.text) continue;
        lines += lineHtml(p, i <= to);
      }
    } else lines = '<div class="ln out">(blokas tuscias - salyga nieko nevaldo?)</div>';

    h += `<div class="blk ${st}" data-id="${b.id}">
      <div class="q">${esc(b.klausimas)}</div>
      <div class="meta">
        <span class="tag">pastraipos ${b.blokas ? from+'-'+to : '-'} (${b.pastraipu})</span>
        <span class="tag ${b.ribos==='TIKRINTI'?'warn':''}">riba: ${b.stabdis}</span>
        ${b.pora ? '<span class="tag pair">isskirtine pora su '+b.pora+'</span>' : ''}
        ${b.poraSu ? '<span class="tag pair">pora su '+b.poraSu+'</span>' : ''}
        ${b.patvirtinta ? '<span class="tag pair">PATVIRTINTA</span>' : ''}
      </div>
      <div class="lines">${lines}</div>
      <div class="acts">
        <button class="sec" onclick="adj('${b.id}',-1)">- pastraipa</button>
        <button class="sec" onclick="adj('${b.id}',1)">+ pastraipa</button>
        <button onclick="confirmB('${b.id}')">Patvirtinti riba</button>
      </div>
    </div>`;
  });

  h += `<h2>2. Komentaru taisykles <span style="font-weight:400;color:var(--g);font-size:12px">- antras, nepriklausomas sluoksnis: salygos atskiriems punktams</span></h2>`;
  S.komentarai.forEach(k => {
    h += `<div class="kom"><div class="a"><b>[${esc(k.pastraipos.join(','))}]</b> ${esc(k.inkaras)}...</div>
      <div class="c">${esc(k.text)}</div></div>`;
  });

  h += `<h2>3. Raudonos redakcines pastabos <span style="font-weight:400;color:var(--g);font-size:12px">- reikalauja zmogaus veiksmo, negali likti dokumente</span></h2>`;
  S.notes.filter(n => !n.cond).slice(0,40).forEach(n => {
    h += `<div class="note"><span class="n">${n.i}</span>${esc(n.text.slice(0,150))}</div>`;
  });

  $('#out').innerHTML = h;
}

function adj(id, d){
  const b = MAP.blokai.find(x => x.id === id);
  if (!b.blokas) return;
  b.blokas.iki = Math.max(b.blokas.nuo - 1, b.blokas.iki + d);
  b.pastraipu = Math.max(0, b.blokas.iki - b.blokas.nuo + 1);
  b.ribos = 'rankinis';
  render();
}
function confirmB(id){
  const b = MAP.blokai.find(x => x.id === id);
  b.patvirtinta = true;
  render();
}
$('#scan').onclick = scan;
$('#exp').onclick = () => {
  const blob = new Blob([JSON.stringify(MAP, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'zemelapis.json'; a.click();
};
</script>
</body>
</html>
